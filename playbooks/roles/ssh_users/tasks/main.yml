- name: Ensure sudo group exists
  group:
    name: sudo
    state: present

- name: Add new sudo users
  user:
    name: "{{ item.username }}"
    state: present
    shell: /bin/bash
    groups: sudo
    password: "*"
  loop: "{{ sudo_users }}"

- name: Create SSH directory for users
  file:
    path: "/home/{{ item.username }}/.ssh"
    state: directory
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: 0700
  loop: "{{ sudo_users }}"

- name: Add public keys to authorized_keys
  copy:
    src: "{{ item.public_key_path }}"
    dest: "/home/{{ item.username }}/.ssh/authorized_keys"
    owner: "{{ item.username }}"
    group: "{{ item.username }}"
    mode: 0600
  loop: "{{ sudo_users }}"

- name: Disable password for SSH users
  user:
    name: "{{ item.username }}"
    password_lock: true
  loop: "{{ sudo_users }}"
